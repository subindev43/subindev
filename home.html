<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUBIN IOS</title>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
      background:#f3f6fb;
      color:#0f172a;
    }

    body{
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .grid-wrapper{
      min-height:100vh;
      width:100%;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.98), rgba(243,247,252,.96) 38%, rgba(235,241,249,.98) 100%);
    }

    .grid-background{
      position:absolute;
      inset:0;
      z-index:0;
      background-image:
        linear-gradient(to right, #d9e3f0 1px, transparent 1px),
        linear-gradient(to bottom, #d9e3f0 1px, transparent 1px);
      background-size:24px 24px;
      -webkit-mask-image:radial-gradient(ellipse 75% 62% at 50% 0%, #000 60%, transparent 100%);
      mask-image:radial-gradient(ellipse 75% 62% at 50% 0%, #000 60%, transparent 100%);
      opacity:.85;
    }

    .blur1,.blur2{
      position:absolute;
      border-radius:999px;
      filter:blur(70px);
      z-index:0;
      opacity:.32;
    }

    .blur1{
      width:280px;
      height:280px;
      background:#7dd3fc;
      top:-80px;
      left:-60px;
    }

    .blur2{
      width:260px;
      height:260px;
      background:#c4b5fd;
      top:70px;
      right:-60px;
    }

    .wrap{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:30px 16px;
    }

    .card{
      width:100%;
      max-width:430px;
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      border:1px solid rgba(255,255,255,.9);
      border-radius:36px;
      box-shadow:
        0 24px 60px rgba(15,23,42,.10),
        inset 0 1px 0 rgba(255,255,255,.92);
      padding:28px 22px 24px;
      text-align:center;
    }

    .app-icon{
      width:110px;
      height:110px;
      margin:0 auto 16px;
      border-radius:30px;
      overflow:hidden;
      border:3px solid rgba(255,255,255,.9);
      box-shadow:
        0 16px 34px rgba(37,99,235,.18),
        0 6px 14px rgba(15,23,42,.08);
      background:#fff;
    }

    .app-icon img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 20px;
      border-radius:999px;
      border:1px solid #d7dfeb;
      background:rgba(255,255,255,.8);
      color:#2563eb;
      font-size:13px;
      font-weight:800;
      letter-spacing:.4px;
      margin-bottom:20px;
      box-shadow:0 4px 10px rgba(15,23,42,.04);
    }

    h1{
      font-size:23px;
      line-height:1.15;
      font-weight:900;
      letter-spacing:-0.03em;
      color:#0f172a;
      margin-bottom:12px;
      text-transform:uppercase;
    }

    .desc{
      font-size:14px;
      line-height:1.75;
      color:#5b6b82;
      margin-bottom:24px;
      padding:0 6px;
    }

    .preview{
      border-radius:28px;
      background:linear-gradient(180deg,#f9fbff 0%,#eef3fb 100%);
      border:1px solid #dde6f0;
      padding:14px;
      margin-bottom:20px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        0 8px 18px rgba(15,23,42,.03);
    }

    .preview-box{
      border-radius:24px;
      background:rgba(255,255,255,.92);
      padding:16px;
      text-align:left;
      box-shadow:0 10px 24px rgba(15,23,42,.06);
    }

    .hero-shot{
      width:100%;
      display:block;
      border-radius:22px;
      border:1px solid #e5ebf3;
      box-shadow:0 10px 24px rgba(15,23,42,.10);
      margin-bottom:16px;
    }

    .app-title{
      text-align:center;
      font-size:18px;
      font-weight:900;
      color:#0f172a;
      margin-bottom:6px;
      letter-spacing:-0.02em;
    }

    .app-sub{
      text-align:center;
      font-size:14px;
      line-height:1.55;
      color:#64748b;
      margin-bottom:16px;
    }

    .download-btn{
      display:block;
      width:100%;
      text-align:center;
      text-decoration:none;
      padding:15px 18px;
      border-radius:999px;
      background:linear-gradient(135deg,#0ea5e9 0%, #2563eb 55%, #3b82f6 100%);
      color:#fff;
      font-size:15px;
      font-weight:900;
      letter-spacing:.4px;
      box-shadow:
        0 14px 28px rgba(37,99,235,.24),
        inset 0 1px 0 rgba(255,255,255,.24);
      transition:transform .2s ease, box-shadow .2s ease;
    }

    .download-btn:hover{
      transform:translateY(-2px);
      box-shadow:
        0 18px 34px rgba(37,99,235,.30),
        inset 0 1px 0 rgba(255,255,255,.24);
    }

    .contact{
      margin-top:8px;
    }

    .contact a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:0 16px;
      text-decoration:none;
      color:#0f172a;
      font-size:14px;
      font-weight:700;
      border-radius:14px;
      background:rgba(255,255,255,.76);
      border:1px solid #dfe7f1;
      box-shadow:0 4px 10px rgba(15,23,42,.04);
      transition:transform .2s ease, background .2s ease;
    }

    .contact a:hover{
      background:#fff;
      transform:translateY(-2px);
    }

    footer{
      margin-top:18px;
      font-size:12px;
      color:#94a3b8;
      letter-spacing:.2px;
    }

    @media (max-width:480px){
      .card{
        border-radius:30px;
        padding:22px 16px 20px;
      }

      .app-icon{
        width:96px;
        height:96px;
        border-radius:26px;
      }

      h1{
        font-size:20px;
      }

      .desc{
        font-size:13px;
      }

      .preview-box{
        padding:14px;
      }
    }
  </style>
</head>
<body>
  <div class="grid-wrapper">
    <div class="grid-background"></div>
    <div class="blur1"></div>
    <div class="blur2"></div>

    <div class="wrap">
      <div class="card">
        <div class="app-icon">
          <img src="icon.jpg" alt="Icon ứng dụng">
        </div>

        <div class="badge">SUBIN IOS</div>

        <h1>TẢI MENU IOS</h1>
        <p class="desc">
          Menu Hack IOS, Bật Tắt Menu Bằng 3 Cách Táp 3 Ngón Tay Vào Màn Hình, Mua Key Liên Hệ Qua Zalo
        </p>

        <div class="preview">
          <div class="preview-box">
            <img src="menu.jpg" alt="Ảnh xem trước" class="hero-shot">

            <div class="app-title">MENU SUBIN</div>
            <div class="app-sub">Nhấn nút bên dưới để tải file IPA về máy</div>

            <a
              class="download-btn"
              href="https://drive.google.com/uc?export=download&id=1di6V_cv24zBdsQSkc4pzVY5SWRvjl229"
              target="_blank"
            >
              TẢI IPA NGAY
            </a>
          </div>
        </div>

        <div class="contact">
          <a href="https://zalo.me/0964074609" target="_blank">Liên hệ Zalo</a>
        </div>

        <footer>© 2026 SUBIN IOS</footer>
      </div>
    </div>
  </div>
</body>
</html>
